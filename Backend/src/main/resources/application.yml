spring:
  application:
    name: vbworld-api

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  cache:
    type: simple

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  info:
    env:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    config-url: /api-docs/swagger-config
    url: /api-docs
    operationsSorter: method
    disable-swagger-default-url: true
  packages-to-scan: com.vbworld.api.presentation.controller

app:
  jwt:
    secret: vbworld-super-secret-jwt-key-change-this-in-production-must-be-256-bits-long-minimum
    access-token-expiry-ms: 900000   # test - 900000
    refresh-token-expiry-ms:  300000 # test - 604800000
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
  auth:
    public-registration-enabled: true
  docs:
    public: true

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/vbworld
    username: vbworld_user
    password: vbworld@2026
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      pool-name: VBWorldHikariDev

  jpa:
    show-sql: true

  cache:
    type: simple

logging:
  level:
    com.vbworld: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:vbworld}
    username: ${DB_USER:vbworld_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: VBWorldHikariProd

  cache:
    type: ${CACHE_TYPE:simple}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: 2000ms

server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

logging:
  level:
    com.vbworld: INFO
    org.springframework: WARN
  file:
    name: logs/vbworld-api.log

management:
  endpoint:
    health:
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  server:
    port: ${MANAGEMENT_PORT:${PORT:8080}}
  info:
    env:
      enabled: false

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}

app:
  jwt:
    secret: ${JWT_SECRET}
  cors:
    allowed-origins: ${ALLOWED_ORIGINS}
  auth:
    public-registration-enabled: ${PUBLIC_REGISTRATION_ENABLED:false}
  docs:
    public: ${PUBLIC_DOCS_ENABLED:false}

info:
  app:
    name: VB World API
    environment: production
    docs: /swagger-ui.html
